[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[tool:mypy]
python_version = 3.11
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool:black]
line-length = 100
target-version = ['py311']

[tool:isort]
profile = black
line_length = 100
