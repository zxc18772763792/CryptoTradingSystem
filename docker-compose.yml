version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TRADING_MODE=paper
      - DATABASE_URL=postgresql+asyncpg://crypto:crypto@db:5432/crypto_trading
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  news_service:
    build: .
    command: ["python", "main.py", "--mode", "news_service"]
    ports:
      - "8000:8000"
    environment:
      - MODE=news_service
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
      - DATABASE_URL=postgresql+asyncpg://crypto:crypto@db:5432/crypto_trading
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    depends_on:
      - db
      - redis
    restart: unless-stopped
    profiles:
      - news_service

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=crypto
      - POSTGRES_PASSWORD=crypto
      - POSTGRES_DB=crypto_trading
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
